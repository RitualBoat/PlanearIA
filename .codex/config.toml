# Project-scoped Codex configuration for PlanearIA.
# Generated by scripts/syncAgentHarness.mjs from .mcp.json. Do not edit by hand.
# Loaded by Codex CLI, the Codex VS Code extension, and the Codex app when this repo is trusted.

project_doc_max_bytes = 65536
project_doc_fallback_filenames = ["CLAUDE.md", ".github/copilot-instructions.md"]

[features]
goals = true

# --- Codex-specific extra (not in .mcp.json) ---
[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"
startup_timeout_sec = 20
tool_timeout_sec = 60

# --- Parity with .mcp.json (universal MCP source of truth) ---

[mcp_servers.codegraph]
command = "codegraph"
args = ["serve", "--mcp"]
startup_timeout_sec = 30
tool_timeout_sec = 90

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 60
tool_timeout_sec = 120

[mcp_servers.github]
command = "node"
args = ["--no-warnings", "scripts/mcpGithubFromGh.mjs"]
startup_timeout_sec = 30
tool_timeout_sec = 90

[mcp_servers.vercel]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.vercel.com"]
startup_timeout_sec = 60
tool_timeout_sec = 120

[mcp_servers.expo]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.expo.dev/mcp"]
startup_timeout_sec = 60
tool_timeout_sec = 120

[mcp_servers.planearia-sqlite]
command = "node"
args = ["--no-warnings", "scripts/mcpPlaneariaSqlite.mjs"]
startup_timeout_sec = 30
tool_timeout_sec = 90

[mcp_servers.playwright]
command = "cmd"
args = ["/c", "npx", "@playwright/mcp@latest"]
startup_timeout_sec = 60
tool_timeout_sec = 120

[mcp_servers.graphify]
command = "graphify-mcp"
args = []
startup_timeout_sec = 30
tool_timeout_sec = 90
