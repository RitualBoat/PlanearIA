name: Agent Harness Parity

# Verifica que los espejos por harness (project-owned) sigan en paridad con la fuente unica en .agents/
# y con .mcp.json, y que los workflows opsx no arrastren el comando zombi upstream de OpenSpec.
#
# Arranque SUAVE: continue-on-error de momento (alerta, no bloquea). Cutover a hard-fail una vez estable:
# quitar `continue-on-error: true` de los pasos de checks. Ver design.md D9.
#
# Nota: el check completo de opsx (`openspec update --force && node scripts/patchOpsxZombie.mjs &&
# git diff --exit-code`) se corre en LOCAL (npm run agent:opsx:update) por fragilidad cross-platform de
# EOL/version; en CI validamos de forma determinista que los archivos commiteados no tengan el zombi.

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

permissions:
  contents: read

concurrency:
  group: agent-harness-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: Harness parity (soft)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generated mirrors in parity with .agents/ source
        continue-on-error: true
        run: npm run agent:harness:check
      - name: MCP server names parity (.mcp.json vs codex/cursor)
        continue-on-error: true
        run: npm run mcp:parity
      - name: opsx workflows free of the zombie continue command
        continue-on-error: true
        run: npm run agent:opsx:patch:check
