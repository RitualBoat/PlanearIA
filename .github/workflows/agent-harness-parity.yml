name: Agent Harness Parity

# Verifica que los espejos por harness (project-owned) sigan en paridad con la fuente unica en .agents/
# y con .mcp.json, y que los workflows opsx usen la CLI local sin el comando zombi upstream.
#
# Arranque SUAVE: continue-on-error de momento (alerta, no bloquea). Cutover a hard-fail una vez estable:
# quitar `continue-on-error: true` de los pasos de checks. Ver design.md D9.
#
# Nota: la regeneracion completa (`npm run agent:opsx:update` seguida de revision de diff) se corre en
# local por fragilidad cross-platform de EOL. En CI validamos de forma determinista la CLI, los artefactos
# y que los workflows commiteados no dependan de un binario global ni contengan el comando zombi.

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main, development]

permissions:
  contents: read

concurrency:
  group: agent-harness-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parity:
    name: Harness parity (soft)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Pinned OpenSpec CLI and artifacts are valid
        continue-on-error: true
        run: npm run openspec:check
      - name: OpenSpec diagnostics report actionable failures
        continue-on-error: true
        run: npm run test:openspec-cli
      - name: Generated mirrors in parity with .agents/ source
        continue-on-error: true
        run: npm run agent:harness:check
      - name: MCP server names parity (.mcp.json vs codex/cursor)
        continue-on-error: true
        run: npm run mcp:parity
      - name: opsx workflows use the pinned CLI and no zombie command
        continue-on-error: true
        run: npm run agent:opsx:patch:check
