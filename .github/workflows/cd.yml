name: CD Builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag. Empty creates demo-${run_number}."
        required: false
        default: ""
  push:
    branches:
      - development
      - main
    paths:
      - "App.tsx"
      - "index.js"
      - "package.json"
      - "package-lock.json"
      - "app.json"
      - "app.config.*"
      - "babel.config.js"
      - "metro.config.js"
      - "tsconfig.json"
      - "assets/**"
      - "backend/**"
      - "scripts/**"
      - "shared/**"
      - "src/**"
      - "types/**"
      - ".github/workflows/cd.yml"

permissions:
  contents: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android:
    name: Build Android standalone APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        # Install with lifecycle scripts disabled and no secrets in scope, so a
        # malicious dependency postinstall cannot read CI secrets during install
        # (supply-chain secret boundary). Secrets are injected only into the
        # trusted steps below that actually need them.
        run: npm ci --ignore-scripts
      - name: Validate Android app environment
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://backend-eight-chi-54.vercel.app' }}
          EXPO_PUBLIC_API_SECRET: ${{ secrets.EXPO_PUBLIC_API_SECRET }}
          EXPO_PUBLIC_ALLOW_NATIVE_LOCALHOST: "false"
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "EXPO_PUBLIC_API_URL is required to build the standalone APK."
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_API_SECRET" ]; then
            echo "EXPO_PUBLIC_API_SECRET is required as a GitHub Actions secret to build the standalone APK."
            exit 1
          fi
      - name: Generate Android project
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://backend-eight-chi-54.vercel.app' }}
          EXPO_PUBLIC_ALLOW_NATIVE_LOCALHOST: "false"
        run: npm run build:android:prebuild
      - name: Build standalone release APK
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://backend-eight-chi-54.vercel.app' }}
          EXPO_PUBLIC_API_SECRET: ${{ secrets.EXPO_PUBLIC_API_SECRET }}
          EXPO_PUBLIC_ALLOW_NATIVE_LOCALHOST: "false"
        run: npm run build:android:release:ci
      - name: Package standalone Android APK
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_PATH="$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was generated."
            find android/app/build/outputs -type f || true
            exit 1
          fi
          cp "$APK_PATH" "PlanearIA-${SHORT_SHA}.apk"
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: planearia-android-apk
          path: PlanearIA-*.apk

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - android
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="demo-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: planearia-android-apk
          path: release-assets
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          NOTES_FILE="release-notes.md"
          {
            echo "PlanearIA demo build"
            echo ""
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Android standalone APK: PlanearIA-*.apk"
            echo ""
            echo "The APK is a standalone demo build of PlanearIA with the JS bundle embedded."
            echo "It is signed for demo sideloading by the CI build, not as a Play Store upload artifact."
          } > "$NOTES_FILE"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "PlanearIA ${RELEASE_TAG}" \
              --notes-file "$NOTES_FILE"
          fi
