name: CD Builds

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag. Empty creates demo-${run_number}."
        required: false
        default: ""
      build_android:
        description: "Build Android standalone release APK"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - development
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web:
    name: Build web static bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build web
        run: npm run build:web
      - name: Package web bundle
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          zip -r "planearia-web-${SHORT_SHA}.zip" dist
          sha256sum "planearia-web-${SHORT_SHA}.zip" > "planearia-web-${SHORT_SHA}.zip.sha256"
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: planearia-web
          path: |
            planearia-web-*.zip
            planearia-web-*.zip.sha256

  android:
    name: Build Android standalone APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.build_android == 'true'
    continue-on-error: true
    env:
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://backend-eight-chi-54.vercel.app' }}
      EXPO_PUBLIC_API_SECRET: ${{ secrets.EXPO_PUBLIC_API_SECRET }}
      EXPO_PUBLIC_ALLOW_NATIVE_LOCALHOST: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: npm ci
      - name: Validate Android app environment
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "EXPO_PUBLIC_API_URL is required to build the standalone APK."
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_API_SECRET" ]; then
            echo "EXPO_PUBLIC_API_SECRET is required as a GitHub Actions secret to build the standalone APK."
            exit 1
          fi
      - name: Generate Android project
        run: npm run build:android:prebuild
      - name: Build standalone release APK
        run: npm run build:android:release:ci
      - name: Package standalone Android APK
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_PATH="$(find android/app/build/outputs/apk/release -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No release APK was generated."
            find android/app/build/outputs -type f || true
            exit 1
          fi
          cp "$APK_PATH" "PlanearIA-${SHORT_SHA}.apk"
          sha256sum "PlanearIA-${SHORT_SHA}.apk" > "PlanearIA-${SHORT_SHA}.apk.sha256"
      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: planearia-android-standalone
          path: |
            PlanearIA-*.apk
            PlanearIA-*.apk.sha256

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - web
      - android
    if: always() && needs.web.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Resolve release tag
        id: release_tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="demo-${GITHUB_RUN_NUMBER}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: planearia-*
          path: release-assets
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          NOTES_FILE="release-notes.md"
          {
            echo "PlanearIA demo build"
            echo ""
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Web bundle: planearia-web-*.zip"
            echo "- Android standalone APK: PlanearIA-*.apk, if the Android job succeeded"
            echo ""
            echo "The APK is a standalone demo build of PlanearIA with the JS bundle embedded."
            echo "It is signed for demo sideloading by the CI build, not as a Play Store upload artifact."
          } > "$NOTES_FILE"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --target "$GITHUB_SHA" \
              --title "PlanearIA ${RELEASE_TAG}" \
              --notes-file "$NOTES_FILE"
          fi
