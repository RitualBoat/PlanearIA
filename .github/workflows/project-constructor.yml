name: Project Constructor Advisory

on:
  pull_request:
    branches:
      - development
    paths:
      - "package.json"
      - "package-lock.json"
      - "scripts/testProjectEngineeringOsConsumer.mjs"
      - "scripts/testProjectConstructorDocs.mjs"
      - "scripts/checkOpenSpecReadiness.mjs"
      - "scripts/opsxFinishChange.mjs"
      - "Documentacion/01-planes-maestros/PLAN_CONSTRUCTOR_PROYECTOS_NUEVOS.md"
      - "Documentacion/02-operacion/constructor-proyectos/**"
      - "Documentacion/02-operacion/CONTROL_DEUDA_TECNICA.md"
      - ".github/workflows/project-constructor.yml"
      - "openspec/changes/**/specs/project-constructor-*/**"
  push:
    branches:
      - "codex/publish-project-engineering-os"
    paths:
      - "package.json"
      - "package-lock.json"
      - "scripts/testProjectEngineeringOsConsumer.mjs"
      - "scripts/testProjectConstructorDocs.mjs"
      - "scripts/checkOpenSpecReadiness.mjs"
      - "scripts/opsxFinishChange.mjs"
      - ".github/workflows/project-constructor.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  constructor-advisory:
    name: Advisory / ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "20.20.0"
          - os: ubuntu-latest
            node: "22.22.0"
          - os: windows-latest
            node: "22.22.0"
          - os: macos-latest
            node: "22.22.0"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install exact consumer dependency
        run: npm ci

      - name: Verify public package consumer contract
        run: npm run test:project-os-contract

      - name: Validate pinned consumer documentation
        run: npm run test:constructor-docs

      - name: Verify PlanearIA debt state through public CLI
        id: debt-state
        continue-on-error: true
        run: npm run debt:check

      - name: Report recognized debt pause without blocking advisory
        if: steps.debt-state.outcome == 'failure'
        shell: bash
        run: echo "::warning title=Debt Control Loop advisory::debt:check reported a paused plan. Review its visible cause, recovery and sanitation issue; this advisory job does not convert that recognized state into a global merge blocker."
