schema: spec-driven

# Contexto del proyecto PlanearIA.
# Esto se muestra a la IA cada vez que crea o aplica un artefacto (propose/apply).
context: |
  PlanearIA: app offline-first para docentes mexicanos.
  Stack: React Native 0.81.5 + Expo SDK 54 + TypeScript 5.9, React Navigation 7.
  Patron: MVVM pragmatico (pantallas delgadas, hooks como ViewModels, Context para estado
  compartido, services para I/O). Persistencia local por defecto: AsyncStorage. SQLite es
  infraestructura opt-in, NO activar como default sin aprobacion explicita.
  Backend: Node serverless en backend/api/index.js + backend/routes. MongoDB Atlas M0.
  Auth JWT con sesiones de refresh. Gateway de IA en backend/lib/aiGateway.js.
  CI/CD: GitHub Actions (ci.yml, cd.yml). Desarrollador solo, presupuesto cero/bajo.

  Fuentes de verdad tecnica (leer y respetar antes de crear cualquier artefacto):
  - CLAUDE.md — reglas de arquitectura, testing, plan activo y estilo del proyecto.
  - Documentacion/00-fundamentos/VISION_ACTUAL.md — vision de producto (suite docente conectada).
  - Documentacion/00-fundamentos/ARQUITECTURA.md — arquitectura y capas.
  - Documentacion/00-fundamentos/FLUJO_SINCRONIZACION.md — motor de sync offline-first.
  - Documentacion/00-fundamentos/IA_CHATBOT_LLM.md — asistente IA y gateway.
  - Documentacion/00-fundamentos/MAPA_MODULOS_ACTUALES.md — modulos actuales.
  - Documentacion/00-fundamentos/ROADMAP_PLANES_MAESTROS.md — roadmap de planes maestros.
  - Documentacion/00-fundamentos/IHC_DISCOVERY_DOCENTE.md — personas, recorridos y checklist Nielsen (gate de UI).
  - Documentacion/01-planes-maestros/PLAN_UXUI_NAVEGACION_GLOBAL.md — plan UX/UI activo (blueprint + backlog de changes).
  - .claude/rules/backend.md, frontend.md, testing.md — reglas por capa.

  Contexto eficiente: para investigar codigo existente durante explore/propose/apply, usar primero
  GitNexus en preguntas estructurales, flujos MVVM, call chains, dependencias, backend/IA, sync/offline
  e impacto (`npx -y gitnexus@latest query -r PlanearIA "<pregunta>"`, `impact`, `context`, `status`).
  Usar CodeGraph como secundario/fallback para fuente lineada estilo Read, simbolos puntuales y comprobacion
  cuando GitNexus sea ambiguo, este stale o no devuelva suficiente contexto editable (`codegraph_explore` o
  `npm run codegraph:explore -- "<pregunta>"`). No usar ambos por reflejo en la misma pregunta.
  Usar `rg`/lecturas directas cuando el indice no aplique, para Markdown/docs/assets/generated files, o se
  necesite contexto exacto no indexado.

  Flujo MCP: usar GitHub MCP para issues/Project, Context7 para APIs recientes, Figma como ground truth
  visual, Playwright MCP para validacion visual web y `planearia-sqlite` solo para diagnostico read-only de
  SQLite local opt-in. MongoDB MCP no es universal: solo dev/staging read-only fuera de Git cuando haga falta
  evidencia de sync remoto o aislamiento por userId.

  REGLAS DE ORO (aplican SIEMPRE, en cualquier artefacto e implementacion):
  - Todo dato academico sincronizable DEBE usar src/sync. No crear clientes HTTP ni colas paralelas.
  - Toda entidad multiusuario debe aislarse por userId.
  - La IA solo accede a modelos via el backend gateway (backend/lib/aiGateway.js). Nunca keys de
    proveedor en el frontend, ni cloud (OpenAI/Gemini) ni local (LM Studio).
  - Las correcciones generadas por IA NO sobreescriben el original: crear copia, borrador, diff o
    resultado de chat para revision del docente.
  - No activar SQLite como default ni borrar llaves legacy @planearia:* sin migracion, validacion y rollback.
  - Nada de microservicios ni servicios costosos salvo peticion explicita con tradeoffs documentados.
  - Web, tablet y movil parten de una pantalla responsive compartida; archivos por plataforma requieren justificacion.

  Idioma: espanol permitido en docs y texto de usuario. Sin emojis en codigo, docs, commits ni logs.
  Comentarios explican el porque, no el que.

# Reglas por artefacto. Claves validas en el schema spec-driven: proposal, specs, design, tasks.
rules:
  proposal:
    - Incluir siempre una seccion de "No objetivos" (fuera de alcance).
    - Referenciar el plan maestro afectado en Documentacion/01-planes-maestros cuando aplique.
    - "Al completar un change nuevo, crear tambien `TLDR.md` en la raiz del directorio del change. Debe resumir Proposal, Design, Spec y Tasks, mas un resumen integral, en ese orden; cada bloque y el resumen tienen maximo 120 palabras, en espanol accesible y con encabezados que expliquen la funcion real del artefacto. Esta es una regla de instruccion y revision humana: la validacion automatica solo comprueba presencia y ubicacion."
    - "Antes de crear el change, ejecutar el gate read-only `npm run openspec:ready:propose -- --issue <n>`. El issue enriquecido declara un bloque JSON `openspec-readiness:pre-propose`; al proponer, crear `readiness.json` en la raíz para enlazar issue, superficies, validaciones, evidencia, rollback y excepciones temporales."
    - "Cada change versionable nuevo crea `brownfield-baseline.md` en su raíz durante propose. El archivo registra solamente la superficie que se tocará: `Superficies tocadas`, `Fuentes de verdad actuales`, `Comportamiento vigente`, `Comportamiento objetivo`, `Compatibilidad legacy`, `Owner de spec y contexto`, `Evidencia actual` y `Fuera de alcance`. No sustituye la spec ni inventaría toda la app; antes de archive el gate comprueba su presencia y estructura."
  specs:
    - Escribir requirements como comportamiento observable por el docente (SHALL + escenarios WHEN/THEN), no como detalles de implementacion.
    - Toda pantalla o flujo de UI debe incluir escenarios de loading, empty, error y offline/sync pendiente.
    - Toda accion de IA debe incluir escenarios de confirmacion explicita del docente, fallback sin proveedor configurado, error temporal y resultado revisable que nunca sobreescribe el original.
    - Incluir criterios de accesibilidad cuando la spec toque UI (labels accesibles, contraste via tokens, area de toque minima 44pt).
  design:
    - "Todo design DEBE declarar los bounded contexts afectados segun `Documentacion/00-fundamentos/MAPA_DDD_ESTRATEGICO_LIGERO.md`. Si afecta un solo contexto, debe declarar explicitamente que no requiere contrato cruzado. Si afecta mas de uno, debe declarar owner de cada dato compartido, consumidores, direccion y forma del contrato, compatibilidad e invariantes aplicables (`userId`, `src/sync`, permisos y confirmacion IA cuando correspondan). Esta declaracion NO exige microservicios, CQRS, event sourcing, colas paralelas ni providers globales nuevos."
    - Para UI de alta paridad, referenciar el ground truth visual (link Figma/Stitch o captura) antes de implementar; si no existe, declararlo como bloqueo, no improvisar.
    - Especificar comportamiento responsive desde la pantalla madre compartida por breakpoint (movil <768, tablet 768-1279, web >=1280).
    - Colores y estilos solo desde tokens de src/themes; las pantallas redisenadas consumen el tema en runtime, no el COLORS estatico.
    - Archivos .web.tsx/.native.tsx solo si la interaccion (no el tamano) lo exige, con justificacion escrita.
    - Cumplir el Estandar de Excelencia Visual (PLAN_UXUI_NAVEGACION_GLOBAL.md seccion 1.9) - checklist anti-slop, micro-interacciones con reanimated, presupuesto de motion/performance para Android gama media, reducir-movimiento respetado.
    - Animacion/motion solo con react-native-reanimated y gesture-handler; Tailwind, GSAP y Framer Motion estan prohibidos en la app RN (solo se permiten en la landing web, artefacto separado).
    - Verificar APIs de librerias (reanimated, gesture-handler, tentap, expo-*) en Context7 antes de escribir design/codigo; partir de GitNexus para inventario y blast radius estructural, usando CodeGraph despues solo si hace falta fuente lineada o fallback.
  tasks:
    - Tareas pequenas y revisables, una a la vez.
    - Ninguna tarea se marca completada sin evidencia (salida de typecheck, lint y tests afectados).
    - Si el change toca una pantalla visible, incluir una tarea final de validacion visual con capturas por breakpoint (Playwright MCP en web) contra el ground truth, adjuntas al issue; declarar este gate "N/A" NO es una opcion valida por defecto y la UI no se cierra solo con tests automaticos. Antes de navegar, levantar expo start --web y esperar a que el bundler responda (HTTP 200, tipicamente localhost:8081).
    - "El estandar de ejecucion es el Protocolo de Interaccion Guiada (Documentacion/01-planes-maestros/meta_guia_planes.md seccion 2.5): Paso 0 US en GitHub Projects, Paso 1 enrich, Paso 2 propose+apply, Paso 3 QA real de navegador."
    - "Antes de archive, ejecutar `npm run openspec:ready:archive -- --change <nombre> --run-local`. Registrar en `readiness.json` solo IDs de validación del perfil estático y referencias de evidencia; nunca comandos arbitrarios ni `N/A` silencioso."
