<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-fixed-variant": "#005312",
              "error": "#ba1a1a",
              "tertiary-fixed": "#ffdbc9",
              "on-primary-fixed": "#001c3a",
              "on-tertiary-fixed": "#321200",
              "surface-container-lowest": "#ffffff",
              "on-secondary": "#ffffff",
              "surface": "#f7f9ff",
              "surface-container": "#ebeef4",
              "tertiary": "#4f2100",
              "error-container": "#ffdad6",
              "on-primary-fixed-variant": "#064883",
              "inverse-surface": "#2d3135",
              "on-tertiary-container": "#f69b63",
              "surface-container-highest": "#dfe3e8",
              "primary-container": "#004580",
              "tertiary-fixed-dim": "#ffb68c",
              "on-surface": "#181c20",
              "on-tertiary": "#ffffff",
              "on-background": "#181c20",
              "on-tertiary-fixed-variant": "#743402",
              "primary-fixed": "#d4e3ff",
              "on-error-container": "#93000a",
              "background": "#f7f9ff",
              "on-secondary-container": "#207128",
              "surface-tint": "#2c609c",
              "tertiary-container": "#713200",
              "on-primary-container": "#85b4f6",
              "outline": "#727781",
              "inverse-on-surface": "#eef1f7",
              "secondary-container": "#a0f499",
              "surface-container-low": "#f1f4fa",
              "inverse-primary": "#a4c8ff",
              "on-primary": "#ffffff",
              "outline-variant": "#c2c6d1",
              "primary": "#002f5a",
              "secondary-fixed-dim": "#87d982",
              "primary-fixed-dim": "#a4c8ff",
              "on-secondary-fixed": "#002204",
              "surface-dim": "#d7dae0",
              "secondary": "#1b6d24",
              "surface-bright": "#f7f9ff",
              "on-surface-variant": "#424750",
              "secondary-fixed": "#a3f69c",
              "on-error": "#ffffff",
              "surface-variant": "#dfe3e8",
              "surface-container-high": "#e5e8ee"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen max-w-[390px] mx-auto overflow-x-hidden">
<!-- Top Navigation Shell (The Anchor) -->
<!-- Determined as a sub-page: Back/Cancel action present, Nav suppressed -->
<header class="bg-surface sticky top-0 z-50 flex items-center justify-between px-4 h-16 w-full">
<button class="flex items-center gap-1 text-on-surface-variant hover:bg-surface-container-low px-2 py-1 rounded-lg transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
<span class="text-sm font-semibold">Cancelar</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-primary">Editar Perfil</h1>
<button class="text-primary-container font-bold opacity-50 cursor-not-allowed text-sm px-3 py-1">
            Guardar
        </button>
</header>
<main class="flex flex-col gap-8 pb-12">
<!-- Imagery Section (Editorial Layout) -->
<section class="relative w-full">
<!-- Portada (Cover) -->
<div class="h-48 w-full bg-surface-container-highest relative overflow-hidden">
<img alt="Library stacks" class="w-full h-full object-cover opacity-60 grayscale-[0.3]" data-alt="Blurred perspective of a modern library bookshelf with warm wood tones and scholarly atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC5lo_tqrMlyO6YGCW_HmDf7xLWUu0QNQLdmIc7ZCwdg4HmSpEwX9Pim2PzCeQtN0qWaZQitXQXY8UT-A-4u21fSJfogrSG86JUVKPdC-NvyJBQ-rawWiF4j9FiMXZzZRsHeN040zwYQ62CBai6ItJ8kOG49RQNmjtGeBcp374lOfu57SbXN7HhdLQnONo3J8NKomzMdOGVPiUg0nBsfuAIKD-jZ_bD-pDxKx2As3GFk-p3Y1zXaYSc1K6BaoNpdALnZMT7UCtByCI"/>
<button class="absolute bottom-4 right-4 bg-surface-container-lowest/90 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2 shadow-sm active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary text-[18px]" data-icon="photo_camera">photo_camera</span>
<span class="text-xs font-bold text-primary">Cambiar portada</span>
</button>
</div>
<!-- Avatar (Profile Photo) -->
<div class="absolute -bottom-10 left-6">
<div class="relative group">
<div class="w-24 h-24 rounded-full border-4 border-surface bg-surface-container-highest overflow-hidden">
<img alt="Profile portrait" class="w-full h-full object-cover" data-alt="Professional headshot of a friendly Latina teacher in a soft-lit educational setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBe8vf-cDMx1WqEUOsU19z2eYrPUatHZURqLtGm2mKjbMXqZp049DP0mdWkiZIZDf0MNf4LD0saar8nj9Jzc0QItMzzsTW25jwt7A8PrI3LTtUMjbmgdYysrUkI0n6Z5NE668O3LvfgcW1MfL1Z1Mck3TcjF6c97T1fSUANZO9xGB-bNgukZLiLS4f1RD8XHSg9JPTRr5hAePkFuaWgVe2-8kR143NNyjOACE_tbPp8RD69G26Hl2tW3M9RJpyKB-ZG5pBTaA3mCSo"/>
</div>
<div class="absolute inset-0 bg-primary/40 rounded-full flex items-center justify-center cursor-pointer hover:bg-primary/50 transition-colors">
<span class="material-symbols-outlined text-white text-[24px]" data-icon="add_a_photo">add_a_photo</span>
</div>
</div>
</div>
</section>
<!-- Form Content (Layered Surfaces) -->
<form class="px-6 mt-8 flex flex-col gap-6">
<!-- Name Field (Validation Error State) -->
<div class="flex flex-col gap-1.5">
<label class="text-[11px] font-bold text-primary tracking-widest uppercase px-1">Nombre(s)</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-lowest border-2 border-error rounded-xl px-4 text-sm font-medium focus:ring-0 focus:outline-none transition-all placeholder:text-on-surface-variant/40" placeholder="Ej: Ana Sofía" type="text" value=""/>
<span class="absolute right-3 top-3.5 material-symbols-outlined text-error text-[20px]" data-icon="error">error</span>
</div>
<span class="text-[11px] font-bold text-error px-1">Este campo es obligatorio</span>
</div>
<!-- Last Name Field -->
<div class="flex flex-col gap-1.5">
<label class="text-[11px] font-bold text-primary tracking-widest uppercase px-1">Apellidos</label>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-xl px-4 text-sm font-medium focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-on-surface-variant/40" placeholder="Ej: Martínez López" type="text" value="Martínez López"/>
</div>
<!-- Bio Textarea -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-bold text-primary tracking-widest uppercase">Biografía</label>
<span class="text-[10px] font-medium text-on-surface-variant/60">0/300</span>
</div>
<textarea class="w-full min-h-[120px] bg-surface-container-lowest border border-outline-variant rounded-xl p-4 text-sm font-medium focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-on-surface-variant/40 resize-none" placeholder="Cuéntanos sobre ti..."></textarea>
</div>
<!-- Email (Disabled State) -->
<div class="flex flex-col gap-1.5">
<label class="text-[11px] font-bold text-on-surface-variant/60 tracking-widest uppercase px-1">Email</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-low border border-transparent rounded-xl px-10 text-sm font-medium text-on-surface-variant/70 cursor-not-allowed" disabled="" type="email" value="ana.sofia@educacion.mx"/>
<span class="absolute left-3 top-3.5 material-symbols-outlined text-on-surface-variant/40 text-[20px]" data-icon="lock">lock</span>
</div>
<p class="text-[10px] text-on-surface-variant/70 italic px-1 mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="info">info</span>
                    Para cambiar tu email, ve a Configuración &gt; Cuenta
                </p>
</div>
<!-- Country Dropdown -->
<div class="flex flex-col gap-1.5">
<label class="text-[11px] font-bold text-primary tracking-widest uppercase px-1">País</label>
<div class="relative">
<div class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-xl px-4 flex items-center justify-between cursor-pointer">
<div class="flex items-center gap-3">
<span class="text-lg">🇲🇽</span>
<span class="text-sm font-medium">México</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Submit Button (Primary) -->
<div class="mt-4">
<button class="w-full h-14 bg-[linear-gradient(135deg,#004580,#005da8)] text-white font-bold rounded-xl shadow-lg shadow-primary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Actualizar Perfil
                </button>
</div>
</form>
</main>
<!-- Bottom Margin for Floating Elements -->
<div class="h-8"></div>
</body></html>
