<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        input:focus, textarea:focus {
            outline: none !important;
            box-shadow: 0px 4px 20px rgba(0, 93, 168, 0.08) !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface antialiased">
<!-- Full Screen Modal Shell -->
<main class="min-h-screen flex flex-col bg-surface">
<!-- Header: TopAppBar logic applied -->
<header class="bg-white/80 backdrop-blur-xl fixed top-0 w-full z-50 shadow-[0px_12px_32px_rgba(0,93,168,0.06)]">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
<button class="flex items-center gap-2 text-on-surface-variant font-medium active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">close</span>
<span>Cancelar</span>
</button>
<h1 class="font-headline text-lg font-bold tracking-tight text-on-surface">Editar Perfil</h1>
<button class="text-primary font-bold active:scale-95 transition-transform">
                    Guardar
                </button>
</div>
</header>
<!-- Content Canvas -->
<div class="mt-16 flex-1 px-4 py-8 space-y-10 max-w-2xl mx-auto w-full">
<!-- Visual Assets Section -->
<section class="space-y-6">
<div class="relative">
<!-- Banner -->
<div class="h-40 w-full rounded-xl overflow-hidden bg-surface-container-high relative group">
<img class="w-full h-full object-cover opacity-80" data-alt="abstract desk setup with soft morning light, minimalist stationery and professional aesthetic textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCl-EsJynrw1K9hvYZ_MmqCadpxrdO0a-D7tF0ctcmTrgTiBbQA4GRWM1hdgbmxsKYFlVmIVEs8pilJZuOeEMuOeu7lv2QkVIc8tLn_Z5OI4ghqe0UAjgvCViTYZq_GJIBFvKl8x_0siOHt2icUV9EXX4Zs8jVLcQVITZqUk_DjLbKSjWidHlsntSR8N2ihHjyHx7vrC9-vzkn0O6KSFNqJhDRvVjeRxfgvecp92FRhvLz97I8jrjGLqkGG8f3kWHv2CPyvO4JbryU"/>
<button class="absolute inset-0 m-auto w-fit h-fit bg-white/90 px-4 py-2 rounded-full flex items-center gap-2 shadow-sm text-primary font-semibold text-sm hover:bg-white active:scale-95 transition-all">
<span class="material-symbols-outlined text-[18px]">photo_camera</span>
                            Cambiar Banner
                        </button>
</div>
<!-- Avatar -->
<div class="absolute -bottom-8 left-6">
<div class="relative">
<div class="w-24 h-24 rounded-full border-4 border-surface overflow-hidden bg-surface-container-highest shadow-lg">
<img class="w-full h-full object-cover" data-alt="professional portrait of a friendly hispanic woman with soft studio lighting and clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzBM2Wf2hioVZetOFgNd-oOfoAIIb_kex1cW-nZMtBwi9qbYZCMB2QBJfGyS4HGKLdXNuyBkV7bMcTanqxYc9yKidQ7pjvuX9INqEWTzLweTiDjtTFS0CgFUMxhO8htJ2Vt7pMWQT3kx1hBtUugpytzhcq76RRYnZklh6jDQT6uYnsFeKbYgTGUuMLobW976DUezHWBcEBgRFfsJplHO3ywpTu1CiI84i8Mn7DV2OaKc5EVtQjl8PTXVzr7B6U1lxUvPWoYYCqohw"/>
</div>
<button class="absolute bottom-0 right-0 p-2 bg-primary text-white rounded-full shadow-md active:scale-90 transition-transform">
<span class="material-symbols-outlined text-[18px]">edit</span>
</button>
</div>
</div>
</div>
<div class="pt-6 px-2">
<h2 class="font-headline headline-sm font-bold text-on-surface">Ana Sofía Martínez López</h2>
<p class="label-md text-on-surface-variant tracking-wider uppercase">Actualizar información pública</p>
</div>
</section>
<!-- Form Section -->
<section class="bg-surface-container-lowest rounded-xl p-6 shadow-[0px_12px_32px_rgba(0,93,168,0.04)] space-y-8">
<!-- Field Group -->
<div class="grid grid-cols-1 gap-6">
<!-- Name -->
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Nombre</label>
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg text-on-surface font-medium focus:bg-surface-container-high transition-colors" type="text" value="Ana Sofía"/>
</div>
<!-- Surname -->
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Apellidos</label>
<input class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg text-on-surface font-medium focus:bg-surface-container-high transition-colors" type="text" value="Martínez López"/>
</div>
<!-- Bio -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">Biografía</label>
<span class="text-[10px] text-on-surface-variant/60">120/500</span>
</div>
<textarea class="w-full p-4 bg-surface-container-low border-none rounded-lg text-on-surface font-medium focus:bg-surface-container-high transition-colors resize-none" rows="4">Maestra de primaria apasionada por la innovación educativa y el desarrollo infantil. 10 años de experiencia transformando aulas.</textarea>
</div>
<!-- Email (Disabled) -->
<div class="space-y-2 opacity-80">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">Email</label>
<div class="relative">
<input class="w-full h-14 pl-4 pr-12 bg-surface-container/50 border-none rounded-lg text-on-surface-variant font-medium cursor-not-allowed" disabled="" type="email" value="anasofia.mtz@gmail.com"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-outline text-[20px]" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<p class="text-[11px] text-on-surface-variant pl-1">El correo electrónico no puede ser modificado por seguridad.</p>
</div>
<!-- Country -->
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest pl-1">País</label>
<div class="relative">
<select class="w-full h-14 px-4 bg-surface-container-low border-none rounded-lg text-on-surface font-medium appearance-none focus:bg-surface-container-high transition-colors">
<option>🇲🇽 México</option>
<option>🇪🇸 España</option>
<option>🇨🇴 Colombia</option>
<option>🇦🇷 Argentina</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-on-surface pointer-events-none">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Bottom Actions -->
<section class="pb-12 pt-4">
<button class="w-full h-16 bg-gradient-to-br from-primary to-primary-container text-white rounded-xl font-bold text-lg shadow-[0px_8px_24px_rgba(0,93,168,0.2)] active:scale-[0.98] transition-transform flex items-center justify-center gap-3">
<span>Guardar Cambios</span>
</button>
<button class="w-full mt-6 py-4 text-error font-bold text-sm uppercase tracking-widest active:bg-error/5 rounded-lg transition-colors">
                    Eliminar Perfil
                </button>
</section>
</div>
</main>
<!-- Contextual Overlay Logic (Suppression) -->
<!-- Note: BottomNavBar is intentionally excluded as per 'Task-Focused' rule for modals -->
