<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-background": "#181c1f",
                        "surface-container-lowest": "#ffffff",
                        "secondary": "#006879",
                        "on-surface": "#181c1f",
                        "on-error": "#ffffff",
                        "surface-dim": "#d7dade",
                        "primary": "#005da8",
                        "on-primary-fixed": "#001c39",
                        "secondary-fixed-dim": "#52d7f3",
                        "tertiary-container": "#b95a00",
                        "inverse-on-surface": "#eef1f5",
                        "surface-tint": "#005fac",
                        "surface-container-highest": "#e0e3e7",
                        "on-tertiary-fixed-variant": "#733500",
                        "surface-container-low": "#f1f4f8",
                        "surface-container": "#ebeef2",
                        "on-secondary-fixed-variant": "#004e5c",
                        "inverse-surface": "#2d3134",
                        "inverse-primary": "#a4c9ff",
                        "primary-container": "#0576d2",
                        "on-surface-variant": "#414752",
                        "on-primary-fixed-variant": "#004884",
                        "tertiary-fixed-dim": "#ffb688",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#311300",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e0e3e7",
                        "on-primary-container": "#fdfcff",
                        "tertiary-fixed": "#ffdbc7",
                        "surface-container-high": "#e5e8ec",
                        "surface": "#f7fafe",
                        "outline": "#717783",
                        "on-tertiary-container": "#fffbff",
                        "on-secondary-fixed": "#001f26",
                        "outline-variant": "#c0c7d4",
                        "secondary-container": "#60e2ff",
                        "on-secondary-container": "#006373",
                        "surface-bright": "#f7fafe",
                        "error": "#ba1a1a",
                        "background": "#f7fafe",
                        "primary-fixed": "#d4e3ff",
                        "primary-fixed-dim": "#a4c9ff",
                        "tertiary": "#934600",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#aaedff"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, #ebeef2 25%, #f1f4f8 50%, #ebeef2 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen">
<!-- TopAppBar Shell -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl fixed top-0 w-full z-50 shadow-[0px_12px_32px_rgba(0,93,168,0.06)]">
<div class="flex items-center justify-between px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">arrow_back</span>
</button>
<h1 class="font-manrope headline-sm font-bold tracking-tight text-blue-700 dark:text-blue-400">Teacher Profile</h1>
</div>
<button class="p-2 -mr-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-blue-700 dark:text-blue-400">settings</span>
</button>
</div>
</header>
<main class="pt-16 pb-12 overflow-x-hidden">
<!-- Banner Placeholder -->
<div class="w-full h-48 shimmer"></div>
<!-- Profile Info Section -->
<div class="px-6 -mt-16 relative z-10 flex flex-col items-center">
<!-- Circular Avatar -->
<div class="w-32 h-32 rounded-full border-4 border-surface-container-lowest bg-surface-container-lowest overflow-hidden shadow-lg">
<div class="w-full h-full shimmer"></div>
</div>
<!-- Identity Text -->
<div class="mt-4 flex flex-col items-center gap-3 w-full">
<!-- Name -->
<div class="h-8 w-48 shimmer rounded-lg"></div>
<!-- Role -->
<div class="h-4 w-32 shimmer rounded-full"></div>
<!-- Email -->
<div class="h-4 w-56 shimmer rounded-full opacity-60"></div>
</div>
</div>
<!-- 4-Metric Stats Card (Bento Style) -->
<div class="px-6 mt-10">
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(0,93,168,0.04)] p-6 grid grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<div class="h-3 w-16 shimmer rounded-full opacity-70"></div>
<div class="h-8 w-12 shimmer rounded-lg"></div>
</div>
<div class="flex flex-col gap-2">
<div class="h-3 w-20 shimmer rounded-full opacity-70"></div>
<div class="h-8 w-14 shimmer rounded-lg"></div>
</div>
<div class="flex flex-col gap-2">
<div class="h-3 w-18 shimmer rounded-full opacity-70"></div>
<div class="h-8 w-10 shimmer rounded-lg"></div>
</div>
<div class="flex flex-col gap-2">
<div class="h-3 w-24 shimmer rounded-full opacity-70"></div>
<div class="h-8 w-16 shimmer rounded-lg"></div>
</div>
</div>
</div>
<!-- Recent Activity Label -->
<div class="px-6 mt-10">
<div class="h-5 w-40 shimmer rounded-full mb-6"></div>
</div>
<!-- Activity Items (Vertical Feed) -->
<div class="px-6 space-y-4">
<!-- Activity Item 1 -->
<div class="bg-surface-container-lowest/50 rounded-xl p-4 flex items-center gap-4">
<div class="w-12 h-12 rounded-lg shimmer flex-shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-3/4 shimmer rounded-full"></div>
<div class="h-3 w-1/2 shimmer rounded-full opacity-60"></div>
</div>
</div>
<!-- Activity Item 2 -->
<div class="bg-surface-container-lowest/50 rounded-xl p-4 flex items-center gap-4">
<div class="w-12 h-12 rounded-lg shimmer flex-shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-5/6 shimmer rounded-full"></div>
<div class="h-3 w-1/3 shimmer rounded-full opacity-60"></div>
</div>
</div>
<!-- Activity Item 3 -->
<div class="bg-surface-container-lowest/50 rounded-xl p-4 flex items-center gap-4">
<div class="w-12 h-12 rounded-lg shimmer flex-shrink-0"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-2/3 shimmer rounded-full"></div>
<div class="h-3 w-1/4 shimmer rounded-full opacity-60"></div>
</div>
</div>
</div>
<!-- Zen Moment / Asymmetric Breathing Space -->
<div class="mt-16 px-6 flex justify-end opacity-20">
<div class="w-24 h-24 shimmer rounded-full"></div>
</div>
</main>
<!-- Navigation Suppressed for Linear/Loading Context as per Rule -->
</body></html>
