<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f7fafe",
              "surface-container-high": "#e5e8ec",
              "surface-container-highest": "#e0e3e7",
              "background": "#f7fafe",
              "secondary-container": "#60e2ff",
              "on-tertiary-fixed": "#311300",
              "on-primary-fixed": "#001c39",
              "on-tertiary-fixed-variant": "#733500",
              "primary-container": "#0576d2",
              "tertiary-fixed": "#ffdbc7",
              "primary-fixed": "#d4e3ff",
              "on-primary": "#ffffff",
              "tertiary-fixed-dim": "#ffb688",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-container": "#fffbff",
              "on-tertiary": "#ffffff",
              "tertiary-container": "#b95a00",
              "outline": "#717783",
              "secondary-fixed-dim": "#52d7f3",
              "on-secondary": "#ffffff",
              "on-error": "#ffffff",
              "on-secondary-fixed-variant": "#004e5c",
              "on-primary-container": "#fdfcff",
              "secondary-fixed": "#aaedff",
              "tertiary": "#934600",
              "surface": "#f7fafe",
              "inverse-primary": "#a4c9ff",
              "on-primary-fixed-variant": "#004884",
              "surface-variant": "#e0e3e7",
              "surface-dim": "#d7dade",
              "surface-container-low": "#f1f4f8",
              "on-secondary-fixed": "#001f26",
              "error-container": "#ffdad6",
              "surface-tint": "#005fac",
              "error": "#ba1a1a",
              "primary": "#005da8",
              "on-surface-variant": "#414752",
              "inverse-surface": "#2d3134",
              "outline-variant": "#c0c7d4",
              "primary-fixed-dim": "#a4c9ff",
              "on-surface": "#181c1f",
              "secondary": "#006879",
              "inverse-on-surface": "#eef1f5",
              "on-background": "#181c1f",
              "surface-container": "#ebeef2",
              "on-secondary-container": "#006373",
              "on-error-container": "#93000a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #EEF3FA; /* User specified background for the canvas */
        }
        .headline-sm { font-size: 1.5rem; line-height: 2rem; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-surface">
<!-- TopAppBar -->
<nav class="fixed top-0 w-full z-50 bg-[#f7fafe]/80 backdrop-blur-xl shadow-[0px_12px_32px_rgba(0,93,168,0.06)]">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-7xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-[#414752] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">menu</span>
</button>
<h1 class="font-manrope text-xl font-extrabold text-[#147AD6] tracking-tight">Comunidad</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-[#414752] transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
</div>
</nav>
<!-- Main Content Area -->
<main class="min-h-screen pt-20 pb-24 px-6 flex items-center justify-center">
<!-- Empty State Container -->
<div class="w-full max-w-md flex flex-col items-center text-center">
<!-- Bento-style background layers for depth -->
<div class="relative w-full aspect-square max-w-[320px] flex items-center justify-center mb-8">
<!-- Decorative Shapes -->
<div class="absolute inset-0 bg-white/40 rounded-full blur-3xl transform -translate-y-4"></div>
<div class="absolute w-64 h-64 bg-primary/5 rounded-full animate-pulse"></div>
<!-- Center Icon -->
<div class="relative z-10 bg-surface-container-lowest p-10 rounded-[2.5rem] shadow-[0px_20px_48px_rgba(0,93,168,0.08)] border border-outline-variant/15">
<span class="material-symbols-outlined text-[80px] text-outline-variant" style="font-variation-settings: 'wght' 200;">groups</span>
</div>
</div>
<!-- Content -->
<div class="space-y-4">
<h2 class="font-headline headline-sm font-bold tracking-tight text-on-surface">
                    ¡Bienvenido a la comunidad docente!
                </h2>
<p class="font-body text-on-surface-variant leading-relaxed px-4">
                    Sé el primero en compartir un recurso, una idea o una experiencia con otros docentes.
                </p>
</div>
<!-- Action Area -->
<div class="mt-10 w-full">
<button class="w-full py-4 px-8 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-semibold flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all active:scale-[0.98] duration-200">
<span>✏️</span>
<span>Crear mi primera publicación</span>
</button>
<!-- Quick Suggestion Chip (Design System AI style) -->
<div class="mt-6 inline-flex items-center gap-2 px-4 py-2 bg-secondary-container/40 backdrop-blur-sm rounded-full border border-secondary-fixed-dim/20">
<span class="material-symbols-outlined text-on-secondary-container text-sm">auto_awesome</span>
<span class="text-xs font-bold text-on-secondary-container uppercase tracking-wider">Sugerencia: "Plan de aula"</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full flex justify-around items-center px-4 pb-4 bg-[#f7fafe]/80 backdrop-blur-xl z-50 rounded-t-2xl shadow-[0px_-4px_24px_rgba(0,93,168,0.04)]">
<!-- Feed (Active) -->
<a class="flex flex-col items-center justify-center bg-[#147AD6] text-white rounded-full p-3 shadow-lg shadow-blue-500/20 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-[0.05rem] mt-0.5">Feed</span>
</a>
<!-- Explore -->
<a class="flex flex-col items-center justify-center text-[#414752] p-3 hover:text-[#147AD6] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">search</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-[0.05rem] mt-0.5">Explore</span>
</a>
<!-- Library -->
<a class="flex flex-col items-center justify-center text-[#414752] p-3 hover:text-[#147AD6] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">auto_stories</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-[0.05rem] mt-0.5">Library</span>
</a>
<!-- Profile -->
<a class="flex flex-col items-center justify-center text-[#414752] p-3 hover:text-[#147AD6] transition-all active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined">person</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-[0.05rem] mt-0.5">Profile</span>
</a>
</nav>
</body></html>
