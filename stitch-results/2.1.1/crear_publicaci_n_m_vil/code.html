<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container-lowest": "#ffffff",
              "secondary-container": "#a0f499",
              "primary": "#002f5a",
              "on-tertiary-fixed": "#321200",
              "tertiary-fixed": "#ffdbc9",
              "on-primary-fixed": "#001c3a",
              "surface-dim": "#d7dae0",
              "surface-container-low": "#f1f4fa",
              "tertiary-fixed-dim": "#ffb68c",
              "on-tertiary-container": "#f69b63",
              "secondary-fixed-dim": "#87d982",
              "surface-variant": "#dfe3e8",
              "primary-fixed-dim": "#a4c8ff",
              "on-primary-fixed-variant": "#064883",
              "error-container": "#ffdad6",
              "primary-fixed": "#d4e3ff",
              "surface-tint": "#2c609c",
              "surface-container-highest": "#dfe3e8",
              "on-surface": "#181c20",
              "outline": "#727781",
              "tertiary": "#4f2100",
              "background": "#f7f9ff",
              "on-secondary": "#ffffff",
              "on-primary-container": "#85b4f6",
              "on-secondary-container": "#207128",
              "inverse-surface": "#2d3135",
              "on-secondary-fixed": "#002204",
              "on-background": "#181c20",
              "on-error-container": "#93000a",
              "secondary-fixed": "#a3f69c",
              "primary-container": "#004580",
              "on-surface-variant": "#424750",
              "error": "#ba1a1a",
              "tertiary-container": "#713200",
              "secondary": "#1b6d24",
              "on-tertiary-fixed-variant": "#743402",
              "surface": "#f7f9ff",
              "on-secondary-fixed-variant": "#005312",
              "outline-variant": "#c2c6d1",
              "inverse-on-surface": "#eef1f7",
              "on-error": "#ffffff",
              "on-primary": "#ffffff",
              "inverse-primary": "#a4c8ff",
              "surface-container": "#ebeef4",
              "on-tertiary": "#ffffff",
              "surface-bright": "#f7f9ff",
              "surface-container-high": "#e5e8ee"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .atelier-gradient {
            background: linear-gradient(135deg, #004580, #005da8);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- Full Screen Modal Container (Mobile 390px) -->
<div class="flex flex-col h-screen w-full max-w-[390px] mx-auto bg-surface-container-lowest shadow-2xl relative overflow-hidden">
<!-- Header -->
<header class="flex items-center justify-between px-6 py-4 bg-surface z-10">
<button class="flex items-center gap-2 text-on-surface-variant active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
<span class="font-bold text-sm tracking-tight">Cerrar</span>
</button>
<button class="atelier-gradient text-white px-6 py-2 rounded-full font-bold text-sm shadow-sm active:scale-95 transition-all">
                Publicar
            </button>
</header>
<!-- Main Content Area -->
<main class="flex-1 overflow-y-auto px-6 py-4 space-y-6">
<!-- User Info & Visibility -->
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-variant overflow-hidden ring-2 ring-surface-container-low">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a young professional man with a friendly expression, soft natural studio lighting, neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDyf_e-bvcA-FkOZKdKjs3_PU9eRrRA5hLe5ksUA-mglGf9mR5jmZR2_FGKdMM7BJ1oxB7kmlbS3cBH89mFh-oKKjDuV9FdEtBXsMxO6e3ymfOhVULjYjg7I-SqlQ1AigXZZAZhgk6C3QmJJ6Rkyb9J_OA9hvyik2gCZSsa1Yz8MbkLVHOXeTNdxQUl2DNONDuJrsJ4tthc2ospSJWSbQPfCNGATiFw8eZSpSakUeTSJoJnuQeZsARqKiWoPp8WY6biZSoG53qSh9Q"/>
</div>
<div class="flex flex-col">
<span class="font-bold text-on-surface">Julián Rivera</span>
<button class="flex items-center gap-1 bg-surface-container-low px-2 py-0.5 rounded-lg w-fit text-[11px] font-bold text-primary transition-colors hover:bg-surface-container-high">
<span class="material-symbols-outlined text-[14px]" data-icon="public">public</span>
                        Todos
                        <span class="material-symbols-outlined text-[14px]" data-icon="expand_more">expand_more</span>
</button>
</div>
</div>
<!-- Input Fields -->
<div class="space-y-4">
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-2xl font-extrabold tracking-tight placeholder:text-outline-variant text-on-surface" placeholder="Título (opcional)" type="text"/>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-lg leading-relaxed placeholder:text-outline-variant text-on-surface-variant min-h-[120px] resize-none" placeholder="Escribe algo para compartir..."></textarea>
</div>
<!-- Mood Selector -->
<div class="space-y-3">
<span class="text-[10px] font-bold uppercase tracking-[0.1em] text-outline">Estado de ánimo</span>
<div class="flex gap-2 overflow-x-auto no-scrollbar pb-2 -mx-1 px-1">
<!-- Inspired (Blue) -->
<button class="flex items-center gap-2 whitespace-nowrap bg-primary-fixed text-on-primary-fixed px-4 py-2 rounded-xl text-xs font-bold border border-primary/10 transition-transform active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-icon="lightbulb" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
                        Inspired
                    </button>
<!-- Productive (Green) -->
<button class="flex items-center gap-2 whitespace-nowrap bg-secondary-fixed text-on-secondary-fixed px-4 py-2 rounded-xl text-xs font-bold transition-transform active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        Productive
                    </button>
<!-- Creative (Yellow) -->
<button class="flex items-center gap-2 whitespace-nowrap bg-tertiary-fixed text-on-tertiary-fixed px-4 py-2 rounded-xl text-xs font-bold transition-transform active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-icon="palette" style="font-variation-settings: 'FILL' 1;">palette</span>
                        Creative
                    </button>
<!-- Focused (Red) -->
<button class="flex items-center gap-2 whitespace-nowrap bg-error-container text-on-error-container px-4 py-2 rounded-xl text-xs font-bold transition-transform active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-icon="target" style="font-variation-settings: 'FILL' 1;">target</span>
                        Focused
                    </button>
<!-- Relaxed (Purple) -->
<button class="flex items-center gap-2 whitespace-nowrap bg-surface-container-high text-on-surface-variant px-4 py-2 rounded-xl text-xs font-bold transition-transform active:scale-95">
<span class="material-symbols-outlined text-[16px]" data-icon="spa" style="font-variation-settings: 'FILL' 1;">spa</span>
                        Relaxed
                    </button>
</div>
</div>
</main>
<!-- Bottom Toolbar -->
<footer class="bg-surface-container-low border-t border-outline-variant/10 px-6 py-4 flex flex-col gap-4">
<div class="flex items-center justify-between">
<!-- Action Icons -->
<div class="flex items-center gap-6">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="image">image</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="description">description</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="link">link</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="rewarded_ads">rewarded_ads</span>
</button>
</div>
<!-- Character Counter -->
<div class="text-[11px] font-bold text-outline">
<span class="text-on-surface">0</span>/2000
                </div>
</div>
<!-- Keyboard/Safe Area Placeholder (Visual only) -->
<div class="h-1 bg-outline-variant/20 w-16 mx-auto rounded-full mt-2"></div>
</footer>
<!-- Minimalist Progress Indication (Academic Detail) -->
<div class="absolute top-0 left-0 w-full h-[3px] bg-surface-container">
<div class="h-full atelier-gradient w-[15%] rounded-r-full"></div>
</div>
</div>
</body></html>
