<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crear Reto - The Collaborative Challenge</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .filled-icon {
            font-variation-settings: 'FILL' 1;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f6f9ff;
            color: #171c21;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #004580 0%, #005da8 100%);
        }
        .glass-overlay {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "tertiary-container": "#924700",
                "on-secondary-fixed-variant": "#005312",
                "tertiary-fixed": "#ffdcc6",
                "error": "#ba1a1a",
                "on-tertiary-container": "#ffc9a7",
                "surface-container-lowest": "#ffffff",
                "surface-container-low": "#eff4fb",
                "on-primary-fixed": "#001c39",
                "surface-container-high": "#e3e9f0",
                "on-error": "#ffffff",
                "background": "#f6f9ff",
                "on-error-container": "#93000a",
                "primary": "#004580",
                "inverse-surface": "#2b3136",
                "inverse-primary": "#a4c9ff",
                "on-primary": "#ffffff",
                "on-tertiary-fixed": "#311300",
                "outline-variant": "#c1c7d3",
                "on-secondary-container": "#217128",
                "secondary-container": "#a0f399",
                "on-secondary": "#ffffff",
                "outline": "#727782",
                "secondary-fixed": "#a3f69c",
                "surface-container-highest": "#dee3ea",
                "surface-bright": "#f6f9ff",
                "on-surface-variant": "#414751",
                "secondary-fixed-dim": "#88d982",
                "on-surface": "#171c21",
                "surface-container": "#e9eef5",
                "tertiary": "#6e3400",
                "tertiary-fixed-dim": "#ffb786",
                "primary-container": "#005da8",
                "surface-dim": "#d5dae1",
                "on-primary-fixed-variant": "#004884",
                "on-background": "#171c21",
                "on-primary-container": "#bdd6ff",
                "surface": "#f6f9ff",
                "on-tertiary-fixed-variant": "#723600",
                "secondary": "#1b6d24",
                "surface-tint": "#0860ab",
                "on-secondary-fixed": "#002204",
                "inverse-on-surface": "#ecf1f8",
                "primary-fixed": "#d4e3ff",
                "on-tertiary": "#ffffff",
                "error-container": "#ffdad6",
                "surface-variant": "#dee3ea",
                "primary-fixed-dim": "#a4c9ff"
              },
              fontFamily: {
                "headline": ["Manrope"],
                "body": ["Manrope"],
                "label": ["Manrope"]
              },
              borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
            },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface flex items-center justify-center min-h-screen p-4">
<!-- Smartphone Frame Emulator -->
<div class="relative w-full max-w-[412px] h-[892px] bg-white rounded-[3rem] shadow-2xl overflow-hidden border-[8px] border-surface-container-highest">
<!-- TopAppBar (JSON Mapping) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 w-full bg-[#eff4fb] dark:bg-slate-900 border-none">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary cursor-pointer active:scale-95 transition-transform" data-icon="arrow_back">arrow_back</span>
<h1 class="font-headline text-primary font-bold leading-tight text-lg">Publicar Reto</h1>
</div>
<span class="material-symbols-outlined text-primary" data-icon="timer">timer</span>
</header>
<!-- Main Content Area -->
<main class="h-full pt-20 pb-32 overflow-y-auto px-6 hide-scrollbar bg-surface-container-low">
<!-- Challenge Activation Toggle Section -->
<div class="flex items-center justify-between p-5 bg-white rounded-xl shadow-sm mb-6 border-l-[3px] border-primary">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-2xl filled-icon" data-icon="emoji_events">emoji_events</span>
<span class="font-headline font-bold text-primary">Publicar como Reto</span>
</div>
<div class="w-12 h-6 bg-primary rounded-full relative flex items-center px-1">
<div class="w-4 h-4 bg-white rounded-full ml-auto shadow-sm"></div>
</div>
</div>
<!-- Form Container -->
<div class="space-y-6">
<!-- Field: Título -->
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Título del Reto</label>
<input class="w-full bg-surface-container-lowest border-none rounded-2xl p-4 text-on-surface font-medium focus:ring-2 focus:ring-primary-container shadow-sm" type="text" value="Reto de Historia: Revolución Mexicana"/>
</div>
<!-- Field: Descripción -->
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Descripción</label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-2xl p-4 text-on-surface font-medium focus:ring-2 focus:ring-primary-container shadow-sm resize-none" placeholder="Describe brevemente el reto..." rows="3"></textarea>
</div>
<!-- Selectors Row -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Materia</label>
<div class="relative">
<select class="w-full bg-surface-container-lowest border-none rounded-2xl p-4 text-on-surface font-medium appearance-none shadow-sm pr-10">
<option>Historia</option>
<option>Geografía</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-4 text-outline pointer-events-none" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Nivel</label>
<div class="bg-primary-fixed text-on-primary-fixed-variant rounded-2xl h-[56px] flex items-center justify-center font-bold shadow-sm">
                            Secundaria
                        </div>
</div>
</div>
<!-- Stats Row -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Tiempo</label>
<div class="flex items-center gap-3 bg-surface-container-lowest rounded-2xl p-4 shadow-sm">
<span class="material-symbols-outlined text-outline" data-icon="schedule">schedule</span>
<span class="font-bold">15 min</span>
</div>
</div>
<div class="space-y-2">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1">Preguntas</label>
<div class="flex items-center gap-3 bg-surface-container-lowest rounded-2xl p-4 shadow-sm">
<span class="material-symbols-outlined text-outline" data-icon="quiz">quiz</span>
<span class="font-bold">10</span>
</div>
</div>
</div>
<!-- Edit Button -->
<button class="w-full bg-surface-container-high text-primary font-bold py-4 rounded-full flex items-center justify-center gap-2 hover:bg-surface-container-highest transition-colors active:scale-95">
<span class="material-symbols-outlined text-xl" data-icon="edit">edit</span>
                    Editar preguntas (10)
                </button>
<!-- Preview Divider -->
<div class="pt-4 border-t border-outline-variant/30">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1 block mb-4">Vista previa en el feed</label>
<!-- Challenge Mini-Card Preview -->
<div class="bg-white rounded-[2rem] p-6 shadow-[0px_24px_48px_rgba(0,72,132,0.08)] space-y-4 border border-outline-variant/10">
<div class="flex justify-between items-start">
<div class="bg-primary-fixed text-on-primary-fixed font-label text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">
                                RETO
                            </div>
<span class="material-symbols-outlined text-outline cursor-pointer" data-icon="more_vert">more_vert</span>
</div>
<div>
<h3 class="font-headline text-lg font-bold text-on-surface leading-tight">Reto de Historia: Revolución Mexicana</h3>
<p class="font-body text-sm text-on-surface-variant mt-1">15 min · 10 preguntas</p>
</div>
<div class="flex gap-2 pt-2">
<button class="flex-1 signature-gradient text-white text-sm font-bold py-3 rounded-full active:scale-95 transition-transform">
                                Contestar ahora
                            </button>
<button class="w-12 h-12 bg-surface-container-high rounded-full flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="bookmark">bookmark</span>
</button>
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (JSON Mapping) -->
<nav class="fixed bottom-0 left-0 w-full flex justify-between items-center px-10 py-6 pb-safe bg-white/80 backdrop-blur-xl border-t border-primary/10 shadow-[0px_-24px_48px_rgba(0,72,132,0.08)] rounded-t-[48px] z-50">
<div class="flex flex-col items-center justify-center text-[#44474e] dark:text-slate-400 px-6 py-2 hover:opacity-90 transition-opacity active:scale-98">
<span class="material-symbols-outlined mb-1" data-icon="chevron_left">chevron_left</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest">Anterior</span>
</div>
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-[#004580] to-[#005DA8] text-white rounded-full px-8 py-3 hover:opacity-90 transition-opacity active:scale-98">
<span class="material-symbols-outlined mb-1" data-icon="chevron_right">chevron_right</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest">Siguiente</span>
</div>
</nav>
<!-- Home Indicator (Mobile Decor) -->
<div class="absolute bottom-1.5 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-on-surface-variant/20 rounded-full z-[60]"></div>
</div>
</body></html>
