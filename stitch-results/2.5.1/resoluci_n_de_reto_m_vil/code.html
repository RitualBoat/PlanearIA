<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#924700",
              "on-secondary-fixed-variant": "#005312",
              "tertiary-fixed": "#ffdcc6",
              "error": "#ba1a1a",
              "on-tertiary-container": "#ffc9a7",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#eff4fb",
              "on-primary-fixed": "#001c39",
              "surface-container-high": "#e3e9f0",
              "on-error": "#ffffff",
              "background": "#f6f9ff",
              "on-error-container": "#93000a",
              "primary": "#004580",
              "inverse-surface": "#2b3136",
              "inverse-primary": "#a4c9ff",
              "on-primary": "#ffffff",
              "on-tertiary-fixed": "#311300",
              "outline-variant": "#c1c7d3",
              "on-secondary-container": "#217128",
              "secondary-container": "#a0f399",
              "on-secondary": "#ffffff",
              "outline": "#727782",
              "secondary-fixed": "#a3f69c",
              "surface-container-highest": "#dee3ea",
              "surface-bright": "#f6f9ff",
              "on-surface-variant": "#414751",
              "secondary-fixed-dim": "#88d982",
              "on-surface": "#171c21",
              "surface-container": "#e9eef5",
              "tertiary": "#6e3400",
              "tertiary-fixed-dim": "#ffb786",
              "primary-container": "#005da8",
              "surface-dim": "#d5dae1",
              "on-primary-fixed-variant": "#004884",
              "on-background": "#171c21",
              "on-primary-container": "#bdd6ff",
              "surface": "#f6f9ff",
              "on-tertiary-fixed-variant": "#723600",
              "secondary": "#1b6d24",
              "surface-tint": "#0860ab",
              "on-secondary-fixed": "#002204",
              "inverse-on-surface": "#ecf1f8",
              "primary-fixed": "#d4e3ff",
              "on-tertiary": "#ffffff",
              "error-container": "#ffdad6",
              "surface-variant": "#dee3ea",
              "primary-fixed-dim": "#a4c9ff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#eff4fb] dark:bg-slate-900 border-none flex justify-between items-center px-6 h-16 w-full">
<div class="flex items-center gap-3">
<button class="material-symbols-outlined text-[#005DA8] dark:text-[#3b82f6] hover:bg-[#dee3ea] dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:opacity-80 active:scale-95 transition-transform" data-icon="arrow_back">arrow_back</button>
<h1 class="Manrope display-md font-bold leading-tight text-[#004580] dark:text-[#eff4fb] tracking-tight text-sm">The Collaborative Challenge</h1>
</div>
<div class="flex items-center gap-2 px-3 py-1.5 bg-tertiary-fixed text-on-tertiary-fixed rounded-full shadow-sm">
<span class="material-symbols-outlined text-sm" data-icon="timer">timer</span>
<span class="font-bold text-xs">12:34</span>
</div>
</header>
<main class="pt-20 pb-32 px-6 max-w-md mx-auto min-h-screen">
<!-- Progress Zone -->
<section class="mb-10">
<div class="flex justify-between items-end mb-3">
<div>
<span class="text-primary font-extrabold uppercase tracking-widest text-[10px] block mb-1">RETO DE HISTORIA</span>
<h2 class="text-xl font-bold text-on-surface leading-tight">Revolución Mexicana</h2>
</div>
<div class="text-right">
<span class="text-secondary font-bold text-sm">Pregunta 3 de 10</span>
</div>
</div>
<div class="h-1.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-secondary w-[30%] rounded-full"></div>
</div>
</section>
<!-- Question Canvas -->
<article class="space-y-10">
<div class="surface-container-lowest bg-white p-2 rounded-xl">
<div class="bg-surface-container-low p-8 rounded-lg shadow-[0px_24px_48px_rgba(0,72,132,0.08)]">
<p class="text-lg font-semibold leading-relaxed text-on-surface">
                        ¿Cuál de los siguientes personajes fue líder del Ejército Libertador del Sur?
                    </p>
</div>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 gap-4">
<!-- Option A -->
<button class="group flex items-center p-5 rounded-xl bg-surface-container-lowest hover:bg-surface-bright border-2 border-transparent transition-all duration-200 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center font-bold text-primary mr-4 group-hover:bg-primary-fixed">A</div>
<span class="text-on-surface-variant font-medium">Francisco I. Madero</span>
</button>
<!-- Option B (Selected) -->
<button class="group flex items-center p-5 rounded-xl bg-primary-fixed border-2 border-primary transition-all duration-200 text-left shadow-sm">
<div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold mr-4">B</div>
<span class="text-on-primary-fixed font-bold">Emiliano Zapata</span>
<span class="material-symbols-outlined ml-auto text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option C -->
<button class="group flex items-center p-5 rounded-xl bg-surface-container-lowest hover:bg-surface-bright border-2 border-transparent transition-all duration-200 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center font-bold text-primary mr-4 group-hover:bg-primary-fixed">C</div>
<span class="text-on-surface-variant font-medium">Venustiano Carranza</span>
</button>
<!-- Option D -->
<button class="group flex items-center p-5 rounded-xl bg-surface-container-lowest hover:bg-surface-bright border-2 border-transparent transition-all duration-200 text-left">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center font-bold text-primary mr-4 group-hover:bg-primary-fixed">D</div>
<span class="text-on-surface-variant font-medium">Pancho Villa</span>
</button>
</div>
</article>
<!-- Decorative Illustration Element -->
<div class="mt-12 rounded-xl overflow-hidden opacity-40 grayscale mix-blend-multiply">
<img alt="Historical Texture" class="w-full h-24 object-cover" data-alt="Close-up of vintage aged parchment paper with subtle ink stains and feathered edges on a clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA6__071fc2DkF5d3DsrpWiVsrV35dsIYq2gRb_FT_PbxoKw9c4DiIunxQHWusVVFm-qs0OujgLkNL7lfcYZ_enn5OKevVactiMeEe4cUbMWU4a_l3m6bymwZIlH7ZE7Xo_GeZfmwmNqo6OMdmRXV8Dtx88gzCYNBjuKB1zKpDkgGQpjxy43MQv49V0fYz3ZXxGEKQwO40YcV53ekf0pSDNUUQSLSClMRmB8kNpOhtoR15zDEFwNtZpPxReWRMv7hjFz5eXbBU2R9A"/>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-between items-center px-10 py-6 pb-safe bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl rounded-t-[48px] z-50 border-t border-[#005DA8]/10 shadow-[0px_-24px_48px_rgba(0,72,132,0.08)]">
<!-- Anterior -->
<button class="flex flex-col items-center justify-center text-[#44474e] dark:text-slate-400 px-6 py-2 hover:opacity-90 transition-opacity active:scale-98">
<span class="material-symbols-outlined mb-1" data-icon="chevron_left">chevron_left</span>
<span class="Manrope label-md uppercase tracking-widest font-bold text-[10px]">Anterior</span>
</button>
<!-- Siguiente (Active State) -->
<button class="flex flex-col items-center justify-center bg-gradient-to-br from-[#004580] to-[#005DA8] text-white rounded-full px-8 py-3 hover:opacity-90 transition-opacity active:scale-98 shadow-lg shadow-primary/20">
<div class="flex items-center gap-2">
<span class="Manrope label-md uppercase tracking-widest font-bold text-[10px]">Siguiente</span>
<span class="material-symbols-outlined text-sm" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</nav>
</body></html>
